workflows:
  ios-cloud-release:
    name: DragonMind iOS Cloud Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      node: 22
      xcode: latest
      vars:
        BUNDLE_ID: "com.dragonmind.mahjong"
        APPLE_TEAM_ID: "$APPLE_TEAM_ID"
        APP_URL: "$NEXT_PUBLIC_APP_URL"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.dragonmind.mahjong
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Point mobile shell at Render app
        script: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          path = Path("mobile-shell/index.html")
          html = path.read_text()
          html = html.replace("https://YOUR_RENDER_URL_HERE", os.environ["APP_URL"])
          path.write_text(html)
          PY
      - name: Add iOS platform
        script: npx cap add ios
      - name: Sync Capacitor
        script: npx cap sync ios
      - name: Set up code signing
        script: xcode-project use-profiles
      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace ios/App/App.xcworkspace \
            --scheme App
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
