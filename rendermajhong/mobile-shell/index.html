<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#071421">
    <title>DragonMind Mahjong</title>
    <style>
      html,
      body {
        height: 100%;
      }

      body {
        align-items: center;
        background: radial-gradient(circle at top, rgba(15, 138, 99, 0.35), transparent 28rem), #071421;
        color: #fff7dc;
        display: flex;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        justify-content: center;
        margin: 0;
        padding: 24px;
        text-align: center;
      }

      main {
        max-width: 360px;
      }

      img {
        height: 112px;
        width: 112px;
      }

      h1 {
        font-size: 2rem;
        line-height: 1;
        margin: 18px 0 10px;
      }

      p {
        color: #9de2cb;
        line-height: 1.5;
        margin: 0 0 18px;
      }

      a {
        background: #f3c64c;
        border-radius: 8px;
        color: #071421;
        display: inline-block;
        font-weight: 900;
        padding: 13px 16px;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="icon.svg" alt="">
      <h1>DragonMind Mahjong</h1>
      <p>Opening the live DragonMind training platform.</p>
      <a id="openApp" href="https://YOUR_RENDER_URL_HERE">Open App</a>
    </main>
    <script>
      const appUrl = "https://YOUR_RENDER_URL_HERE";
      const button = document.querySelector("#openApp");
      button.href = appUrl;
      if (!appUrl.includes("YOUR_RENDER_URL_HERE")) {
        window.location.replace(appUrl);
      }
    </script>
  </body>
</html>
